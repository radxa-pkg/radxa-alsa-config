# Radxa I2S MX98357A HiFi conf

# Replace the local HiFi.conf and run
# `alsaucm reload && systemctl --user restart wireplumber`
# to apply

SectionDevice."Speaker" {
	Comment "Speaker"

	Value {
		PlaybackPCM "hw:${CardId},0"
		PlaybackPriority 200
	}
}

Include.hdmi1.File "Hdmi1.conf"
Include.hdmi2.File "Hdmi2.conf"
Include.hdmi3.File "Hdmi3.conf"
Include.hdmi4.File "Hdmi4.conf"
Include.hdmi5.File "Hdmi5.conf"
